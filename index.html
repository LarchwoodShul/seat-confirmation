<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seat Reservation</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
padding:20px;
font-size:16px;
}

.form-wrapper{
max-width:480px;
margin:auto;
}

.modal{
display:none;
position:fixed;
z-index:9999;
inset:0;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:#fff;
max-width:420px;
margin:20% auto;
padding:20px;
border-radius:10px;
text-align:center;
}

.modal-content h3{
color:#c00;
}

.banner{
width:100%;
height:260px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:25px;
background:#fff;
}

.banner img{
max-height:100%;
max-width:100%;
}

.section{
background:#fff;
padding:20px;
border-radius:8px;
margin-bottom:25px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.section-title{
font-size:18px;
margin-bottom:15px;
border-bottom:2px solid #ddd;
padding-bottom:5px;
}

h1{
font-size:22px;
text-align:center;
}

label{
font-weight:bold;
display:block;
margin-top:12px;
}

input{
width:100%;
background:#f5f5f5;
border:1px solid #ccc;
border-radius:4px;
padding:12px;
min-height:44px;
box-sizing:border-box;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

#seatGrid input{
width:100%;
box-sizing:border-box;
}

.total{
font-size:22px;
font-weight:bold;
text-align:right;
margin-top:20px;
}

button{
padding:16px;
font-size:16px;
width:100%;
cursor:pointer;
background:#007bff;
color:white;
border:none;
border-radius:4px;
display:flex;
align-items:center;
justify-content:center;
}

button:disabled{
background:#cccccc;
color:#666;
cursor:not-allowed;
}

.spinner{
display:none;
width:18px;
height:18px;
border:3px solid rgba(255,255,255,0.3);
border-top:3px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-right:10px;
}

button.loading .spinner{
display:inline-block;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#signaturePad{
width:100%;
height:200px;
border:1px solid #ccc;
border-radius:4px;
background:#fff;
touch-action:none;
}

</style>
</head>

<body>

<div class="form-wrapper">

<div id="errorModal" class="modal">
<div class="modal-content">
<h3>Error</h3>
<div id="modalMessage"></div>
<button onclick="closeModal()">OK</button>
</div>
</div>

<div class="banner">
<img src="betrachellarchwood_logo.png">
</div>

<h1>Seat Reservation Form</h1>

<div class="section">

<div class="section-title">Personal Information</div>

<label>Name</label>
<input id="customerName">

<label>Email</label>
<input id="email" type="email">

<label>Cellphone</label>
<input id="cellphone">

</div>

<div class="section">

<div class="section-title">Assigned Seats</div>

<table id="seatGrid">

<thead>
<tr>
<th>Section</th>
<th>Name</th>
<th>Price</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="section">

<div class="section-title">Payment Information</div>

<label>Credit Card Number</label>
<input id="cc">

<label>Expiration Date</label>
<input id="exp" placeholder="MM/YY">

</div>

<div class="section">

<label>
<input type="checkbox" id="ack">
I acknowledge the agreement
<a href="agreement.pdf" target="_blank">View Document</a>
</label>

</div>

<div class="section">

<div class="section-title">Signature</div>

<p>Please sign below</p>

<canvas id="signaturePad"></canvas>

<button type="button" onclick="clearSignature()">Clear Signature</button>

</div>

<div class="total">
Total Amount: $<span id="total">0</span>
</div>

<button id="submitBtn" onclick="submitForm()">
<span class="spinner"></span>
<span id="btnText">Submit</span>
</button>

</div>

<script>

const SCRIPT_URL="PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

let total=0;

const sectionNames={
MS_RR:"Men’s Seats – Main Shul (Remaining Rows)",
MS_R1:"Men’s Seats – Main Shul (Row 1)",
LS_R1:"Ladies’ Seats – Main Shul (Row 1)",
LS_RR:"Ladies’ Seats – Main Shul (Remaining Rows)",
MM_R1:"Men’s Seats – Midrash (Row 1)",
MM_RR:"Men’s Seats – Midrash (All Other Rows)"
};

function showError(m){
document.getElementById("modalMessage").innerText=m;
document.getElementById("errorModal").style.display="block";
}

function closeModal(){
document.getElementById("errorModal").style.display="none";
}

function loadSeats(){

const params=new URLSearchParams(window.location.search);

const name=params.get("name");
const seats=params.get("seats");

if(name) customerName.value=name;

if(!seats) return;

const rows=seats.split(",");

rows.forEach(r=>{

const [section,seatName,price]=r.split("|");

total+=Number(price);

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${sectionNames[section] || section}</td>
<td><input value="${seatName}"></td>
<td>$${Number(price).toLocaleString()}</td>
`;

document.querySelector("#seatGrid tbody").appendChild(tr);

});

document.getElementById("total").innerText=total.toLocaleString();

}

function collectSeats(){

let seats=[];

document.querySelectorAll("#seatGrid tbody tr").forEach(r=>{

const section=r.children[0].innerText;
const name=r.children[1].querySelector("input").value;
const price=r.children[2].innerText.replace("$","").replace(",","");

seats.push({section,name,price});

});

return seats;

}

const canvas=document.getElementById("signaturePad");
const ctx=canvas.getContext("2d");

let drawing=false;

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mouseup",stop);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchend",stop);
canvas.addEventListener("touchmove",draw);

function start(e){
drawing=true;
draw(e);
}

function stop(){
drawing=false;
ctx.beginPath();
}

function draw(e){

if(!drawing) return;

e.preventDefault();

let rect=canvas.getBoundingClientRect();

let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

ctx.lineWidth=2;
ctx.lineCap="round";
ctx.strokeStyle="#000";

ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);

}

function clearSignature(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

function getSignature(){
return canvas.toDataURL("image/jpeg");
}

async function submitForm(){

const btn=document.getElementById("submitBtn");
const btnText=document.getElementById("btnText");

try{

if(!customerName.value.trim()) return showError("Name required");
if(!email.value.match(/.+@.+/)) return showError("Valid email required");
if(!cellphone.value.trim()) return showError("Cellphone required");
if(!cc.value.trim()) return showError("Credit card required");
if(!exp.value.trim()) return showError("Expiration required");
if(!ack.checked) return showError("You must acknowledge agreement");

btn.disabled=true;
btn.classList.add("loading");
btnText.innerText="Processing...";

await fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
submissionId:crypto.randomUUID(),
name:customerName.value,
email:email.value,
cellphone:cellphone.value,
cc:cc.value,
exp:exp.value,
totalAmount:total,
seats:collectSeats(),
signature:getSignature()
})
});

alert("Form submitted successfully");
location.reload();

}catch(e){

showError("Connection error. Please try again.");
btn.disabled=false;
btn.classList.remove("loading");
btnText.innerText="Submit";

}

}

loadSeats();

</script>

</body>

</html>
